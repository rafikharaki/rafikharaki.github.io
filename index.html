<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Program kalkulator</title>
        <style>
            body {
                background-color: #f4f4f4;
                font-family: sans-serif;
            }

            button {
                width: 50px; 
                height: 40px; 
                cursor: pointer;
                background-color: #2c2727; 
                border: 1px solid #ffffff;    
                color: white;
            }

            .btn-clear {
                background-color: #2c2727; 
            }

            .btn-hasil {
                background-color: #2c2727;
            }
        </style>
    </head>
    <body>
        <center>
        <h2>PROGRAM KALKULATOR</h2>
        
        <table border="1" bordercolor="#ccc" cellpadding="5" style="border-collapse: collapse; background-color: gray;">
            <tr>
                <td colspan="4">
                    <input id="layar" style="width: 95%; height: 30px; text-align: right; border: 1px solid #ca3614;" readonly>
                </td>
            </tr>
            <tr>
                <td colspan="3"><button style="width: 100%;" class="btn-clear" onclick="hapusSemua()">C</button></td>
                <td><button style="width: 100%;" onclick="hapusSatu()">&#9003;</button></td>
            </tr>
            <tr>
                <td><button onclick="ambilangka('1')">1</button></td>
                <td><button onclick="ambilangka('2')">2</button></td>
                <td><button onclick="ambilangka('3')">3</button></td>
                <td><button onclick="ambilangka('+')">+</button></td>
            </tr>
            <tr>
                <td><button onclick="ambilangka('4')">4</button></td>
                <td><button onclick="ambilangka('5')">5</button></td>
                <td><button onclick="ambilangka('6')">6</button></td>
                <td><button onclick="ambilangka('-')">-</button></td>
            </tr>
            <tr>
                <td><button onclick="ambilangka('7')">7</button></td>
                <td><button onclick="ambilangka('8')">8</button></td>
                <td><button onclick="ambilangka('9')">9</button></td>
                <td><button onclick="ambilangka('*')">*</button></td>
            </tr>
            <tr>
                <td><button onclick="ambilangka('.')">.</button></td>
                <td><button onclick="ambilangka('0')">0</button></td>
                <td><button class="btn-hasil" onclick="hitunghasil()">=</button></td>
                <td><button onclick="ambilangka('/')">/</button></td>
            </tr>
        </table>
        </center>

        <script>
            var layar = document.getElementById("layar");
            function ambilangka(input) {
                layar.value = layar.value + input;
            }
            function hapusSemua() {
                layar.value = "";
            }
            function hapusSatu() {
                layar.value = layar.value.slice(0, -1);
            }
             function hitunghasil() {
                try {
                    if (layar.value != "") {
                        layar.value = eval(layar.value);
                    }
                } catch (error) {
                    alert("Input tidak valid");
                    hapusSemua();
                }
            }
        </script>
    </body>
</html>
